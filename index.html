<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.A100X | Terminal Institucional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [view, setView] = useState('terminal');
            const [isVip, setIsVip] = useState(false);
            const [time, setTime] = useState('');

            useEffect(() => {
                const t = setInterval(() => setTime(new Date().toLocaleTimeString('es-ES', {timeZone: 'UTC'})), 1000);
                return () => clearInterval(t);
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-[#0B1120] border-b border-slate-800 p-4 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <span className="text-amber-500 text-3xl">⬢</span>
                                <h1 className="text-xl font-black font-mono text-white">Q.A100X.APP</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <span className="text-xs font-mono text-slate-500">{time} UTC</span>
                                <button onClick={() => setIsVip(!isVip)} className="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400">MODO: {isVip ? 'VIP' : 'GRATIS'}</button>
                            </div>
                        </div>
                    </header>
                    <main className="flex-1 p-6 max-w-7xl mx-auto w-full">
                        <div className="bg-[#0B1120] border border-slate-800 rounded-2xl p-8 text-center">
                            <h2 className="text-3xl font-black mb-4">Bienvenido a la Terminal</h2>
                            <p className="text-slate-400 mb-8 text-lg">Tu centro de inteligencia para activos 100X.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-[#020617] p-6 rounded-xl border border-slate-800">
                                    <h3 className="text-emerald-400 font-bold mb-2 uppercase tracking-widest text-xs">Mejores Proyecciones</h3>
                                    <p className="text-2xl font-black text-white">Bitcoin (BTC)</p>
                                    <p className="text-emerald-500 font-mono">+18% Est.</p>
                                </div>
                                <div className="bg-[#020617] p-6 rounded-xl border border-slate-800">
                                    <h3 className="text-red-400 font-bold mb-2 uppercase tracking-widest text-xs">Riesgo Institucional</h3>
                                    <p className="text-2xl font-black text-white">Cardano (ADA)</p>
                                    <p className="text-red-500 font-mono">-12% Est.</p>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
