                                <button onClick={executePayment} className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-black font-black text-xl py-4 rounded-xl uppercase tracking-wider hover:scale-105 transition-transform shadow-[0_0_25px_rgba(245,158,11,0.4)]">
                                    OBTENER ACCESO VIP AHORA
                                </button>
                                
                                {/* Sello de Seguridad de Stripe RESTAURADO */}
                                <div className="flex items-center justify-center mt-6 space-x-2 bg-[#020617] py-3 px-4 rounded-xl border border-slate-800">
                                    <span className="text-2xl">🔒</span>
                                    <p className="text-sm font-bold font-mono text-slate-400">Procesado de forma segura por Stripe</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
