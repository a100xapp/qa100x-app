            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                // Reloj
                const t = setInterval(() => setTimeStr(new Date().toLocaleTimeString('es-ES', {timeZone: 'UTC'})), 1000);
                
                // Fechas
                const today = new Date();
                const nextUpdate = new Date(today);
                nextUpdate.setDate(today.getDate() + ((1 + 7 - today.getDay()) % 7 || 7));
                setDatesStr({
                    daily: today.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase(),
                    weekly: nextUpdate.toLocaleDateString('es-ES', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase() + ' - 08:00 AM PST'
                });

                // Ticker
                fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=["BTCUSDT","ETHUSDT","SOLUSDT","RENDERUSDT","ONDOUSDT","NEARUSDT","TAOUSDT","LINKUSDT","ADAUSDT","WLDUSDT"]')
                    .then(res => res.json())
                    .then(data => setTickerData(data))
                    .catch(err => console.error("Error Ticker", err));

                // Firebase Auth Listener
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    setUser(usr);
                    if(usr) setShowAuthModal(false);
                });

                return () => { clearInterval(t); unsubscribe(); };
            }, []);

            // Efecto al seleccionar moneda (Fetch Precio + Gráfico)
            useEffect(() => {
                const asset = cryptoData[selectedAssetKey];
                if(!asset) return;

                setCurrentPrice(null); // Loading state

                fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${asset.apiSymbol}`)
                    .then(res => res.json())
                    .then(data => {
                        const p = parseFloat(data.price);
                        setCurrentPrice(p);
                        renderChart(p, asset);
                    })
                    .catch(err => {
                        console.error("Error fetching price", err);
                        setCurrentPrice(0);
                    });
            }, [selectedAssetKey]);

            // Renderizado de Gráfico
            const renderChart = (price, asset) => {
                if(!chartRef.current || !price) return;
                
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                const ctx = chartRef.current.getContext('2d');
                const isBuy = asset.list === 'alpha';
                const pShort = price * asset.projMuls[0];
                const pMid = price * asset.projMuls[1];
                const pLong = price * asset.projMuls[2];

                const gradient = ctx.createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, isBuy ? 'rgba(245, 158, 11, 0.4)' : 'rgba(239, 68, 68, 0.4)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.0)');

                Chart.defaults.font.family = "'Inter', sans-serif";
                
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Actual (En vivo)', 'Corto Plazo', 'Medio Plazo', 'Largo Plazo'],
                        datasets: [{
                            data: [price, pShort, pMid, pLong],

                            backgroundColor: gradient,
                            borderWidth: 4,
                            pointBackgroundColor: '#0f172a',
                            pointBorderColor: isBuy ? '#f59e0b' : '#ef4444',
                            pointBorderWidth: 3,
                            pointRadius: 6,
                            fill: true,
                            tension: 0.4

                        responsive: true,

                        }
                    }
                });
            };

                if(p === null) return 'Conectando...';

                return `$${Number(p).toLocaleString('en-US', {minimumFractionDigits: (p<1?4:2), maximumFractionDigits:(p<1?4:2)})}`;
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isLoginMode) await auth.signInWithEmailAndPassword(email, password);
                    else await auth.createUserWithEmailAndPassword(email, password);

            const selectedAsset = cryptoData[selectedAssetKey];

                                const change = parseFloat(coin.priceChangePercent);
                                const isUp = change >= 0;
                                return (

                                        <span className="text-white font-bold">{sym}</span> 
                                        <span className="text-slate-300 ml-1">${p}</span> 
                                        <span className={`${isUp ? 'text-green-500' : 'text-red-500'} ml-2 font-bold`}>{isUp ? '▲' : '▼'} {Math.abs(change).toFixed(2)}%</span>
                                        <span className="text-slate-700 mx-4">|</span>
                                    </div>
                                );

                                <span className="text-amber-500 text-4xl lg:text-5xl animate-pulse drop-shadow-[0_0_15px_rgba(245,158,11,0.4)]">⬢</span>
                                <div>
                                    <h1 className="text-2xl lg:text-3xl font-black font-mono tracking-tighter text-white uppercase leading-none">Q.A100X Terminal</h1>
                                    <h2 className="text-sm font-bold font-mono text-slate-400 uppercase mt-1">Análisis Institucional</h2>
                                </div>

                            <div className="flex flex-col xl:flex-row items-center xl:items-start gap-4 mt-3 w-full">

                                        <span className="text-cyan-500 text-xs mr-2 animate-pulse">●</span>
                                        <span className="text-[10px] font-black text-slate-400 font-mono mr-1">ACTUALIZADO:</span>

                                        <span className="text-[10px] font-black text-slate-400 font-mono mr-1">REBALANCEO:</span>
                                        <span className="text-[10px] font-black text-amber-400 font-mono uppercase">{datesStr.weekly}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </header>

                    {/* CUERPO PRINCIPAL */}
                    <div className="flex-1 flex flex-col xl:flex-row w-full relative">
                        
                        {/* BARRA LATERAL (LISTA DE ACTIVOS) */}
                        <aside className="w-full xl:w-[350px] bg-[#0B1120] border-r border-slate-800 flex flex-col shrink-0">
                            <div className="flex border-b border-slate-800">
                                <button onClick={() => setActiveTab('alpha')} className={`flex-1 py-4 text-sm font-black transition-colors flex items-center justify-center ${activeTab === 'alpha' ? 'text-amber-500 border-b-2 border-amber-500 bg-[#020617]' : 'text-slate-500 hover:text-slate-300'}`}><span className="text-xl mr-2">💎</span> ALPHA (LONG)</button>
                                <button onClick={() => setActiveTab('omega')} className={`flex-1 py-4 text-sm font-black transition-colors flex items-center justify-center ${activeTab === 'omega' ? 'text-red-500 border-b-2 border-red-500 bg-[#020617]' : 'text-slate-500 hover:text-slate-300'}`}><span className="text-xl mr-2">🚨</span> OMEGA (SHORT)</button>
                            </div>
                            
                            <div className="overflow-y-auto p-4 space-y-2 h-[40vh] xl:h-[calc(100vh-200px)]">
                                {Object.values(cryptoData).filter(item => item.list === activeTab).map(asset => {
                                    const isLocked = asset.tierReq > currentTier;
                                    const dotColor = activeTab === 'alpha' ? 'bg-green-500' : 'bg-red-500';
                                    const isSelected = selectedAssetKey === asset.id;

                                    if (isLocked) {
                                        return (
                                            <button key={asset.id} onClick={() => currentTier === 1 ? setShowAuthModal(true) : setShowVipModal(true)} className="w-full text-left p-4 rounded-xl border border-slate-800 hover:border-amber-500/50 bg-[#0B1120] transition-all relative overflow-hidden group">
                                                <div className={`absolute inset-0 bg-gradient-to-r ${activeTab === 'alpha' ? 'from-amber-500/5' : 'from-red-500/5'} to-transparent`}></div>
                                                <div className="flex items-center space-x-3 relative z-10">
                                                    <div className="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></div>
                                                    <div>
                                                        <p className={`font-black ${activeTab === 'alpha' ? 'text-amber-500' : 'text-red-500'} font-mono text-base`}>{currentTier === 1 ? '🔒 REGÍSTRATE GRATIS' : '🔒 REQUIERE VIP'}</p>
                                                        <p className="text-xs font-bold text-slate-400">{activeTab === 'alpha' ? 'GEMA OCULTA' : 'TRAMPA DETECTADA'}</p>
                                                    </div>
                                                </div>
                                            </button>
                                        );
                                    }

                                    return (
                                        <button key={asset.id} onClick={() => setSelectedAssetKey(asset.id)} className={`w-full text-left p-4 rounded-xl border transition-all flex justify-between items-center group ${isSelected ? 'border-amber-500 bg-[#020617] shadow-[0_0_15px_rgba(245,158,11,0.1)]' : 'border-slate-800 hover:border-slate-600 bg-[#0B1120]'}`}>
                                            <div className="flex items-center space-x-3">
                                                <div className={`w-3 h-3 rounded-full ${dotColor}`}></div>
                                                <div>
                                                    <p className="font-black text-slate-100 font-mono text-base">{asset.symbol}</p>
                                                    <p className="text-xs font-bold text-slate-500 group-hover:text-slate-400">{asset.name}</p>
                                                </div>
                                            </div>
                                            <span className={`text-xs font-black transition-colors hidden md:block ${isSelected ? 'text-amber-500' : 'text-slate-600 group-hover:text-slate-300'}`}>VER</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </aside>

                        {/* DASHBOARD PRINCIPAL DE ANÁLISIS */}
                        <main className="flex-1 overflow-y-auto p-4 lg:p-8 bg-[#020617]">
                            <div className="max-w-7xl mx-auto space-y-8">
                                
                                {/* Header del Activo */}
                                <div className="flex flex-col lg:flex-row justify-between items-start border-b border-slate-800 pb-6 gap-4">
                                    <div>
                                        <div className="flex items-center space-x-4 mb-3">
                                            <h2 className="text-4xl lg:text-5xl font-black text-white tracking-tight">{selectedAsset.name}</h2>
                                            <span className="bg-slate-800 text-white px-4 py-1.5 rounded text-lg font-bold border border-slate-600">{selectedAsset.symbol}</span>
                                        </div>
                                        <p className="text-amber-500 text-lg font-bold tracking-widest uppercase">{selectedAsset.narrative}</p>
                                    </div>
                                    <div className="bg-[#0B1120] p-4 rounded-xl border border-slate-800 min-w-[200px] text-center lg:text-right">
                                        <p className="text-xs text-slate-500 font-mono mb-2">VEREDICTO ALGORÍTMICO</p>
                                        <div className={`inline-block px-5 py-2 rounded font-black text-xl tracking-wide border ${selectedAsset.verdict.includes('Buy') ? 'border-green-500 text-green-400 bg-green-500/10 shadow-[0_0_15px_rgba(34,197,94,0.2)]' : (selectedAsset.verdict.includes('Hold') ? 'border-yellow-500 text-yellow-400 bg-yellow-500/10' : 'border-red-500 text-red-400 bg-red-500/10 shadow-[0_0_15px_rgba(239,68,68,0.2)]')}`}>
                                            {selectedAsset.verdict.toUpperCase()}
                                        </div>
                                    </div>
                                </div>

                                {/* Tesis */}
                                <section className="bg-[#0B1120] border-l-4 border-amber-500 p-6 rounded-r-xl shadow-lg">
                                    <p className="text-base text-slate-200 font-medium leading-relaxed">"{selectedAsset.thesis}"</p>
                                </section>

                                {/* 6 Paneles de Datos */}
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                    {[
                                        { title: '⚙️ Análisis Técnico', data: selectedAsset.tech },
                                        { title: '⛓️ Flujos On-Chain', data: selectedAsset.onchain },
                                        { title: '🌍 Contexto Macro', data: selectedAsset.macro },
                                        { title: '💎 Tokenomics', data: selectedAsset.tokenomics },
                                        { title: '🛡️ Seguridad', data: selectedAsset.security },
                                        { title: '🚀 Adopción', data: selectedAsset.adoption }
                                    ].map((panel, i) => (
                                        <div key={i} className="bg-[#0B1120] border border-slate-800 rounded-xl p-6 glow-box hover:border-slate-600 transition-colors">
                                            <h3 className="text-sm font-black uppercase text-slate-400 tracking-widest mb-4">{panel.title}</h3>
                                            <ul className="space-y-3 font-medium text-sm text-slate-300">
                                                {panel.data.map((item, j) => (
                                                    <li key={j} className="flex items-start"><span className="text-amber-500 mr-2 font-black">›</span><span className="leading-relaxed">{item}</span></li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>

                                {/* Gráficos y Proyecciones */}
                                <section className="bg-[#0B1120] border border-slate-800 rounded-xl p-6 lg:p-8 relative">
                                    <div className="flex flex-col md:flex-row items-start md:items-center justify-between mb-8">
                                        <h2 className="text-sm font-black uppercase text-slate-400 tracking-widest mb-4 md:mb-0"><span className="text-xl mr-2">📊</span> Proyección Cuantitativa</h2>
                                        <div className="bg-[#020617] px-6 py-3 rounded-xl border border-slate-800 text-center md:text-right w-full md:w-auto">
                                            <p className="text-xs text-slate-500 font-black mb-1">PRECIO EN VIVO (BINANCE)</p>
                                            <p className="text-3xl font-black text-white font-mono">{formatPrice(currentPrice)}</p>
                                        </div>
                                    </div>

                                    <div className="chart-container mb-10 bg-[#020617] border border-slate-800/50 rounded-xl overflow-hidden p-2">
                                        <canvas ref={chartRef}></canvas>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-[#020617] p-6 rounded-xl border border-slate-800">
                                            <h3 className="text-xs font-black text-slate-500 mb-2">OBJETIVO CORTO PLAZO</h3>
                                            <p className={`text-2xl font-black font-mono mb-3 ${selectedAsset.list==='alpha' ? 'text-cyan-400' : 'text-red-300'}`}>{formatPrice(currentPrice ? currentPrice * selectedAsset.projMuls[0] : null)}</p>
                                            <p className="text-sm font-medium text-slate-300">{selectedAsset.projections.short}</p>
                                        </div>
                                        <div className="bg-[#020617] p-6 rounded-xl border border-slate-800">
                                            <h3 className="text-xs font-black text-slate-500 mb-2">OBJETIVO MEDIO PLAZO</h3>
                                            <p className={`text-2xl font-black font-mono mb-3 ${selectedAsset.list==='alpha' ? 'text-blue-400' : 'text-red-400'}`}>{formatPrice(currentPrice ? currentPrice * selectedAsset.projMuls[1] : null)}</p>
                                            <p className="text-sm font-medium text-slate-300">{selectedAsset.projections.mid}</p>
                                        </div>
                                        <div className="bg-[#020617] p-6 rounded-xl border border-slate-800 shadow-[0_0_20px_rgba(245,158,11,0.05)]">
                                            <h3 className="text-xs font-black text-slate-500 mb-2">OBJETIVO LARGO PLAZO</h3>
                                            <p className={`text-2xl font-black font-mono mb-3 ${selectedAsset.list==='alpha' ? 'text-amber-400' : 'text-red-500'}`}>{formatPrice(currentPrice ? currentPrice * selectedAsset.projMuls[2] : null)}</p>
                                            <p className="text-sm font-medium text-slate-300">{selectedAsset.projections.long}</p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </main>
                    </div>

                    {/* MODAL AUTH (FIREBASE LOGIN/SIGNUP) */}
                    {showAuthModal && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-[#0B1120] border border-amber-500/30 w-full max-w-md rounded-3xl p-8 relative shadow-[0_0_40px_rgba(245,158,11,0.15)] overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-500 to-transparent"></div>
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-5 right-5 text-slate-500 hover:text-white text-xl">✕</button>
                                
                                <div className="text-center mb-8 mt-2">
                                    <span className="text-amber-500 text-5xl block mb-4 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)]">⬢</span>
                                    <h2 className="text-2xl font-black text-white uppercase tracking-tighter">{isLoginMode ? 'Conexión Segura' : 'Desbloquea el Nivel 2'}</h2>
                                    <p className="text-slate-400 text-sm mt-2 font-medium">{isLoginMode ? 'Ingresa tus credenciales para acceder a la terminal.' : 'Crea tu cuenta gratis hoy para revelar 3 activos adicionales.'}</p>
                                </div>

                                {authError && <div className="bg-red-500/10 border border-red-500/30 text-red-400 text-xs font-bold p-3 rounded mb-4 text-center">{authError}</div>}

                                <form onSubmit={handleAuth} className="space-y-4">
                                    <div>
                                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required className="w-full bg-[#020617] border border-slate-700 text-white rounded-xl px-4 py-4 focus:outline-none focus:border-amber-500 transition-colors shadow-inner" placeholder="Correo electrónico institucional" />
                                    </div>
                                    <div>
                                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} required className="w-full bg-[#020617] border border-slate-700 text-white rounded-xl px-4 py-4 focus:outline-none focus:border-amber-500 transition-colors shadow-inner" placeholder="Contraseña segura" />
                                    </div>
                                    <button type="submit" className="w-full bg-amber-500 hover:bg-amber-400 text-black font-black text-lg py-4 rounded-xl uppercase tracking-widest transition-colors mt-4 shadow-[0_0_20px_rgba(245,158,11,0.2)]">
                                        {isLoginMode ? 'INGRESAR' : 'REGISTRARSE GRATIS'}
                                    </button>
                                </form>

                                <div className="mt-6 text-center">
                                    <button onClick={() => { setIsLoginMode(!isLoginMode); setAuthError(''); }} className="text-sm text-slate-500 hover:text-white transition-colors underline underline-offset-4">
                                        {isLoginMode ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL VIP (UPGRADE A NIVEL 3) */}
                    {showVipModal && (
                        <div className="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
                            <div className="bg-[#0B1120] border-2 border-amber-500/50 w-full max-w-lg rounded-3xl p-8 relative shadow-[0_0_50px_rgba(245,158,11,0.2)] text-center">
                                <button onClick={() => setShowVipModal(false)} className="absolute top-5 right-5 text-slate-500 hover:text-white text-xl">✕</button>
                                
                                <span className="text-6xl block mb-4">💎</span>
                                <div className="bg-amber-500/10 text-amber-500 text-xs font-black px-3 py-1 rounded-full inline-block border border-amber-500/30 mb-4 tracking-widest">NIVEL 3 REQUERIDO</div>
                                <h2 className="text-3xl font-black text-white uppercase tracking-tighter mb-4">Acceso VIP Restringido</h2>
                                <p className="text-slate-300 text-base mb-8 leading-relaxed">Estás intentando acceder a una Gema Institucional Oculta. Para ver todos los análisis, alertas y proyecciones de Wall Street, necesitas la membresía VIP.</p>
                                
                                <button className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-black font-black text-xl py-4 rounded-xl hover:scale-105 transition-transform shadow-[0_0_25px_rgba(245,158,11,0.4)] uppercase tracking-wider">
                                    OBTENER ACCESO VIP AHORA
                                </button>
                                <p className="text-xs text-slate-500 mt-4 font-mono">Integración con pasarela de pago (Stripe) en proceso...</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
